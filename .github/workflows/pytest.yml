name: 自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install pytest requests allure-pytest

    # 删除启动服务器的步骤！

    - name: 运行测试
      run: |
        pytest test_allure.py -v --alluredir=./allure-results

    - name: 上传测试报告
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-results