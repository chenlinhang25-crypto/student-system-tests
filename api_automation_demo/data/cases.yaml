- name: 查询存在的用户
  method: GET
  path: /users/1
  expected_status: 200
  expected_name: Alice
- name: 查询不存在的用户
  method: GET
  path: /users/999
  expected_status: 404
  expected_error: user not found
- name: 创建用户
  method: POST
  path: /users
  json:
    name: Carol
    role: tester
  expected_status: 201
  expected_name: Carol
